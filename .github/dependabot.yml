version: 2
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
      open-pull-requests-limit: 10
      groups:
          svelte:
              patterns:
                  - 'svelte*'
                  - '@sveltejs/*'
          cloudflare:
              patterns:
                  - '@cloudflare/*'
                  - 'wrangler'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
      open-pull-requests-limit: 5
